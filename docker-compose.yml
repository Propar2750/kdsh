services:
  pipeline:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    command: python -m pytest tests/ -v
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
