services:
  # Default service with GPU support (falls back to CPU if no GPU)
  pipeline:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
    command: python -m pipeline.run_eval_fast --max-samples 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # CPU-only version (use if GPU causes issues)
  pipeline-cpu:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PYTHONUNBUFFERED=1
    command: python -m pipeline.run_eval_fast --max-samples 5
