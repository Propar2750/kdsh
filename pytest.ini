[pytest]
# Pytest configuration for KDSH Track A pipeline

# Register custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')

# Filter warnings
filterwarnings =
    # Ignore deprecation warnings from third-party packages
    ignore::DeprecationWarning:httplib2.auth
    ignore::DeprecationWarning:pkg_resources._vendor.pyparsing
    # Ignore Pathway unused operators warning (expected in tests)
    ignore::UserWarning:pathway.internals.parse_graph

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
